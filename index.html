<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKITMC | OVERDRIVE</title>
    <link rel="icon" type="image/png" href="assets/clicker.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --panel: rgba(12, 12, 18, 0.95);
            --yellow: #ffcc00;
            --orange: #ff6600;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Lightning Effect Layer */
        #fx-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        header {
            background: var(--panel);
            padding: 15px 40px;
            border-bottom: 2px solid var(--orange);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        .battery-container {
            width: 300px; height: 22px; border: 2px solid #333;
            background: #000; position: relative; overflow: hidden;
        }
        #battery-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--orange), var(--yellow));
            box-shadow: 0 0 15px var(--yellow);
            transition: width 0.3s ease;
        }

        main { display: flex; flex: 1; overflow: hidden; z-index: 5; }

        /* Left Side: The Reactor */
        .reactor-section {
            flex: 1.4; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; border-right: 1px solid var(--border);
        }

        #score-text { 
            font-size: 5rem; font-weight: 900; color: var(--yellow);
            text-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 5px;
        }
        #pps-text { color: var(--orange); font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 2px; }

        .core-box {
            position: relative; width: 320px; height: 320px;
            cursor: pointer; transition: transform 0.05s;
        }
        .core-box:active { transform: scale(0.92); }
        .core-box img { width: 100%; height: 100%; filter: drop-shadow(0 0 20px var(--orange)); }

        /* Right Side: Shop */
        .shop-section { 
            flex: 1; background: var(--panel); 
            display: flex; flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .shop-header {
            padding: 20px; background: #000;
            border-bottom: 1px solid var(--orange);
            color: var(--yellow); font-weight: 900;
        }

        #upgrade-container { flex: 1; overflow-y: auto; padding: 15px; }

        .item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            padding: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .item:hover:not(.locked) { 
            background: rgba(255, 102, 0, 0.1); 
            border-color: var(--yellow);
            transform: translateX(5px);
        }
        .item.locked { opacity: 0.2; cursor: not-allowed; }

        .item-info h4 { color: var(--yellow); font-size: 0.85rem; text-transform: uppercase; }
        .item-info p { color: #666; font-size: 0.7rem; font-family: sans-serif; margin-top: 2px; }
        .item-cost { text-align: right; color: var(--orange); font-weight: 900; font-size: 1.1rem; }

        /* Pop-up Text */
        .pop {
            position: absolute; pointer-events: none;
            color: #fff; font-weight: 900;
            animation: floatUp 0.6s ease-out forwards;
            z-index: 101;
        }
        @keyframes floatUp { 
            0% { opacity:1; transform:translateY(0) scale(1); } 
            100% { opacity:0; transform:translateY(-120px) scale(1.5); } 
        }

        footer {
            background: #000; padding: 12px 40px;
            border-top: 1px solid var(--orange);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem;
        }

        .dev-portal {
            background: var(--orange); color: #000;
            padding: 8px 18px; text-decoration: none;
            font-weight: 900; border-radius: 4px;
            transition: 0.3s; box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
            text-transform: uppercase;
        }
        .dev-portal:hover { background: var(--yellow); box-shadow: 0 0 25px var(--yellow); }

        .shake { animation: shakeAnim 0.1s linear 2; }
        @keyframes shakeAnim { 
            0% { transform: translate(2px, 2px); } 
            50% { transform: translate(-2px, -2px); } 
            100% { transform: translate(0, 0); } 
        }
    </style>
</head>
<body>

<canvas id="fx-layer"></canvas>

<header>
    <div>SKITMC <span style="color:var(--orange)">OVERDRIVE</span></div>
    <div class="battery-container">
        <div id="battery-fill"></div>
    </div>
    <div id="level-txt" style="color:var(--yellow)">UNIT LVL: 1</div>
</header>

<main>
    <section class="reactor-section" id="shake-target">
        <div id="pps-text">0.0 WATTS/S</div>
        <div id="score-text">0</div>
        <div class="core-box" id="core-btn">
            <img src="assets/clicker.png" alt="CORE">
        </div>
        <div id="rebirth-btn" style="display:none; color:var(--orange); border:2px solid var(--orange); padding:10px; cursor:pointer; font-weight:900;" onclick="rebirth()">ACTIVATE REBIRTH</div>
    </section>

    <section class="shop-section">
        <div class="shop-header">GRID SUBSYSTEMS</div>
        <div id="upgrade-container"></div>
    </section>
</main>

<footer>
    <div style="color: #444">MANUAL: <span id="stat-ppc" style="color:#888">1</span> | AUTO: <span id="stat-pps" style="color:#888">0</span></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="color: #777">Learn more about the developer:</span>
        <a href="https://skitmc.github.io/" target="_blank" class="dev-portal">DEVELOPER PORTAL</a>
    </div>
</footer>

<script>
    let watts = 0, totalEver = 0, level = 1, rebirths = 0;
    const canvas = document.getElementById('fx-layer');
    const ctx = canvas.getContext('2d');
    
    const catalog = [
        { name: "Crank Handle", type: "click", cost: 15, power: 1, rate: 3.2, desc: "Manual energy generation." },
        { name: "Lemon Battery", type: "auto", cost: 50, power: 1, rate: 1.15, desc: "Weak chemical reaction." },
        { name: "Static Plate", type: "auto", cost: 400, power: 6, rate: 1.15, desc: "Harvesting friction." },
        { name: "Copper Coil", type: "click", cost: 1200, power: 12, rate: 3.5, desc: "Higher conductivity." },
        { name: "Solar Panel", type: "auto", cost: 2000, power: 25, rate: 1.16, desc: "Photon capture." },
        { name: "Wind Turbine", type: "auto", cost: 10000, power: 80, rate: 1.17, desc: "Harness the gale." },
        { name: "Coal Boiler", type: "auto", cost: 60000, power: 400, rate: 1.18, desc: "Old world burning." },
        { name: "Nuclear Rod", type: "auto", cost: 250000, power: 1800, rate: 1.19, desc: "Fission stability." },
        { name: "Plasma Tank", type: "auto", cost: 1000000, power: 8500, rate: 1.2, desc: "Superheated matter." },
        { name: "Fusion Core", type: "auto", cost: 8000000, power: 45000, rate: 1.21, desc: "The power of stars." }
    ];

    let owned = new Array(catalog.length).fill(0);

    function format(n) {
        if (n < 1000) return Math.floor(n);
        let s = ["K", "M", "B", "T", "Qa", "Qi"];
        let e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(1) + s[e-1];
    }

    function init() {
        resize();
        load();
        window.addEventListener('resize', resize);
        setInterval(gameTick, 100);
        setInterval(save, 5000);
        
        window.addEventListener('keydown', (e) => { if(e.code === "Space") { e.preventDefault(); processClick(); }});
        document.getElementById('core-btn').addEventListener('mousedown', (e) => processClick(e));
        renderShop();
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function processClick(e) {
        let mult = (1 + (level - 1) * 0.1) * Math.pow(4, rebirths);
        let ppcBase = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppcBase += (u.power * owned[i]); });
        
        let val = ppcBase * mult;
        watts += val;
        totalEver += val;
        
        spark();
        if(e) pop(e.clientX, e.clientY, val);
        document.getElementById('shake-target').classList.add('shake');
        setTimeout(() => document.getElementById('shake-target').classList.remove('shake'), 100);
        updateUI(mult);
    }

    function spark() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#ffcc00";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff6600";
        ctx.beginPath();
        let cx = window.innerWidth * 0.35, cy = window.innerHeight * 0.5;
        ctx.moveTo(cx, cy);
        for(let i=0; i<8; i++) {
            cx += (Math.random() - 0.5) * 500;
            cy += (Math.random() - 0.5) * 500;
            ctx.lineTo(cx, cy);
        }
        ctx.stroke();
        setTimeout(() => ctx.clearRect(0,0,canvas.width,canvas.height), 80);
    }

    function pop(x, y, v) {
        const p = document.createElement('div');
        p.className = 'pop';
        p.style.left = x + 'px'; p.style.top = y + 'px';
        p.innerText = "+" + format(v);
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    function gameTick() {
        let mult = (1 + (level - 1) * 0.1) * Math.pow(4, rebirths);
        let pps = 0;
        catalog.forEach((u, i) => { if(u.type === 'auto') pps += (u.power * owned[i]); });
        
        let gain = (pps * mult) / 10;
        watts += gain;
        totalEver += gain;
        
        if (totalEver >= 100 * Math.pow(level, 2.5)) level++;
        updateUI(mult, pps);
    }

    function updateUI(mult, pps = 0) {
        document.getElementById('score-text').innerText = format(watts);
        document.getElementById('pps-text').innerText = format(pps * mult) + " WATTS / SEC";
        document.getElementById('level-txt').innerText = "UNIT LVL: " + level;
        document.getElementById('stat-pps').innerText = format(pps * mult);
        
        let ppc = 1;
        catalog.forEach((u, i) => { if(u.type === 'click') ppc += (u.power * owned[i]); });
        document.getElementById('stat-ppc').innerText = format(ppc * mult);

        let curReq = 100 * Math.pow(level-1, 2.5);
        let nxtReq = 100 * Math.pow(level, 2.5);
        let progress = ((totalEver - curReq) / (nxtReq - curReq)) * 100;
        document.getElementById('battery-fill').style.width = Math.min(100, progress) + "%";
        
        // Refresh shop prices visually
        const items = document.querySelectorAll('.item');
        catalog.forEach((u, i) => {
            let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
            if (watts >= cost) items[i].classList.remove('locked');
            else items[i].classList.add('locked');
        });
    }

    function buy(i) {
        let cost = Math.floor(catalog[i].cost * Math.pow(catalog[i].rate, owned[i]));
        if (watts >= cost) {
            watts -= cost;
            owned[i]++;
            renderShop();
        }
    }

    function renderShop() {
        const container = document.getElementById('upgrade-container');
        container.innerHTML = '';
        catalog.forEach((u, i) => {
            let cost = Math.floor(u.cost * Math.pow(u.rate, owned[i]));
            let item = document.createElement('div');
            item.className = `item ${watts < cost ? 'locked' : ''}`;
            item.onclick = () => buy(i);
            item.innerHTML = `
                <div class="item-info">
                    <h4>${u.name} [Lv.${owned[i]}]</h4>
                    <p>${u.desc}</p>
                </div>
                <div class="item-cost">${format(cost)} W</div>
            `;
            container.appendChild(item);
        });
    }

    function save() { localStorage.setItem('skit_v5_data', JSON.stringify({watts, totalEver, level, rebirths, owned})); }
    function load() {
        let d = JSON.parse(localStorage.getItem('skit_v5_data'));
        if(d && d.owned) {
            watts = d.watts; totalEver = d.totalEver; 
            level = d.level; rebirths = d.rebirths; owned = d.owned;
        }
    }

    init();
</script>
</body>
</html>
