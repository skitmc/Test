<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKITMC | ULTIMATE CLICKER</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.3);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
            z-index: 10;
        }

        header h1 {
            letter-spacing: 4px;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        main { display: flex; flex: 1; overflow: hidden; }

        .clicker-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #334155;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .score-container { text-align: center; margin-bottom: 3rem; }
        .score-container h2 { font-size: 4.5rem; margin: 0; }
        .score-container p { color: var(--accent); font-weight: bold; letter-spacing: 1px; }

        #big-button {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 8px solid var(--accent);
            background: var(--card);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        #big-button:active { transform: scale(0.92); }
        #big-button span { font-size: 6rem; filter: drop-shadow(0 0 10px var(--accent)); }

        .shop-section {
            flex: 1;
            background: var(--card);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        #shop-container { flex: 1; overflow-y: auto; padding-right: 5px; }

        .upgrade-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .upgrade-card:hover:not(.disabled) { border-color: var(--accent); background: #16213e; }
        .upgrade-card.disabled { opacity: 0.3; cursor: not-allowed; }

        .upgrade-info h4 { color: var(--text); margin-bottom: 4px; font-size: 1rem; }
        .upgrade-info p { font-size: 0.75rem; color: var(--text-dim); }

        .upgrade-cost { text-align: right; font-weight: bold; color: var(--success); font-size: 1.1rem; }

        .reset-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0.6;
        }
        .reset-btn:hover { opacity: 1; background: var(--danger); color: white; }

        .footer-stats {
            padding: 12px 25px;
            background: #020617;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <header>
        <h1>SKITMC TERMINAL v2.0</h1>
    </header>

    <main>
        <section class="clicker-section">
            <div class="score-container">
                <h2 id="score">0</h2>
                <p id="pps-display">0 / SEC</p>
            </div>
            
            <button id="big-button">
                <span>💎</span>
            </button>
        </section>

        <section class="shop-section">
            <div class="shop-header">
                <h2>MARKET</h2>
                <span id="save-status" style="font-size: 0.7rem; color: var(--success);">Autosaved</span>
            </div>
            
            <div id="shop-container"></div>
            
            <button class="reset-btn" onclick="resetGame()">WIPE ALL DATA</button>
        </section>
    </main>

    <div class="footer-stats">
        <div>Total Clicks: <span id="stat-clicks">0</span></div>
        <div>Click Power: <span id="stat-ppc">1</span></div>
        <div>Session Saved to Browser</div>
    </div>

    <script>
        // Game State
        let score = 0;
        let totalClicks = 0;
        let pointsPerClick = 1;
        let pointsPerSecond = 0;

        const baseUpgrades = [
            { id: 0, name: "Neural Link", desc: "+1 Per Click", cost: 15, increase: 1, type: 'click' },
            { id: 1, name: "Basic Drone", desc: "+1 Per Second", cost: 50, increase: 1, type: 'auto' },
            { id: 2, name: "Advanced Script", desc: "+8 Per Second", cost: 400, increase: 8, type: 'auto' },
            { id: 3, name: "Quantum Mouse", desc: "+30 Per Click", cost: 1500, increase: 30, type: 'click' },
            { id: 4, name: "SkitMC Mainframe", desc: "+150 Per Second", cost: 8000, increase: 150, type: 'auto' }
        ];

        let owned = new Array(baseUpgrades.length).fill(0);

        // Load Game Data
        function loadGame() {
            const savedData = localStorage.getItem('skitmc_clicker_save');
            if (savedData) {
                const data = JSON.parse(savedData);
                score = data.score || 0;
                totalClicks = data.totalClicks || 0;
                owned = data.owned || new Array(baseUpgrades.length).fill(0);
                recalculateStats();
            }
        }

        // Save Game Data
        function saveGame() {
            const data = { score, totalClicks, owned };
            localStorage.setItem('skitmc_clicker_save', JSON.stringify(data));
            const status = document.getElementById('save-status');
            status.innerText = "Saved!";
            setTimeout(() => status.innerText = "Autosaved", 2000);
        }

        function resetGame() {
            if (confirm("Are you sure? This deletes everything!")) {
                localStorage.removeItem('skitmc_clicker_save');
                location.reload();
            }
        }

        function recalculateStats() {
            pointsPerClick = 1;
            pointsPerSecond = 0;
            baseUpgrades.forEach((u, i) => {
                if (u.type === 'click') pointsPerClick += (u.increase * owned[i]);
                else pointsPerSecond += (u.increase * owned[i]);
            });
        }

        function renderShop() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';
            baseUpgrades.forEach((u, i) => {
                const currentCost = Math.floor(u.cost * Math.pow(1.15, owned[i]));
                const card = document.createElement('div');
                card.className = `upgrade-card ${score < currentCost ? 'disabled' : ''}`;
                card.onclick = () => buyUpgrade(i);
                card.innerHTML = `
                    <div class="upgrade-info">
                        <h4>${u.name} [Lv.${owned[i]}]</h4>
                        <p>${u.desc}</p>
                    </div>
                    <div class="upgrade-cost">${currentCost.toLocaleString()}</div>
                `;
                container.appendChild(card);
            });
        }

        function buyUpgrade(i) {
            const currentCost = Math.floor(baseUpgrades[i].cost * Math.pow(1.15, owned[i]));
            if (score >= currentCost) {
                score -= currentCost;
                owned[i]++;
                recalculateStats();
                updateDisplay();
                renderShop();
            }
        }

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('pps-display').innerText = `${pointsPerSecond.toLocaleString()} / SEC`;
            document.getElementById('stat-clicks').innerText = totalClicks.toLocaleString();
            document.getElementById('stat-ppc').innerText = pointsPerClick.toLocaleString();
        }

        // Click Event
        document.getElementById('big-button').addEventListener('click', () => {
            score += pointsPerClick;
            totalClicks++;
            updateDisplay();
            renderShop();
        });

        // Game Loops
        setInterval(() => {
            score += (pointsPerSecond / 10); // Run at 10fps for smoothness
            updateDisplay();
            renderShop();
        }, 100);

        setInterval(saveGame, 5000); // Save every 5 seconds

        // Start
        loadGame();
        renderShop();
        updateDisplay();
    </script>
</body>
</html>
